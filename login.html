<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login page</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>
<div class="page">
  <div class="card">
    <div class="brand">SIGN IN</div>

    <div class="field">
      <label for="lemail">Email Address</label>
      <input type="email" placeholder="example@gmail.com" id="lemail">
      <hr>
    </div>

    <div class="field">
      <label for="lpassword">Password</label>
      <input type="password" placeholder="Password" id="lpassword">
      <hr>
    </div>

    <span id="mess"></span>

    <button id="loginBtn">Login Account</button>

    <div class="divider">
      <span>or</span>
    </div>

    <button id="goggleBtn">
      <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.84l6.09-6.09C34.46 3.09 29.5 1 24 1 14.82 1 7.07 6.48 3.69 14.19l7.07 5.49C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.22-.42-4.74H24v8.98h12.42c-.54 2.9-2.18 5.36-4.65 7.01l7.13 5.54C43.18 37.13 46.1 31.27 46.1 24.5z"/>
        <path fill="#FBBC05" d="M10.76 28.32A14.54 14.54 0 0 1 9.5 24c0-1.5.26-2.95.72-4.32L3.15 14.2A23.94 23.94 0 0 0 0 24c0 3.86.92 7.51 2.56 10.73l8.2-6.41z"/>
        <path fill="#34A853" d="M24 47c5.96 0 10.97-1.97 14.63-5.36l-7.13-5.54C29.6 37.73 26.97 38.5 24 38.5c-6.26 0-11.57-4.22-13.24-9.93l-8.2 6.41C6.07 42.67 14.35 47 24 47z"/>
      </svg>
      Continue with Google
    </button>

    <div class="footer-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

  <input type="password" placeholder="Password" id="lpassword"><br>
  <span id="mess"></span><br>
  <button id="loginBtn">Login Account</button> -->
  



</body>

<script type="module" src="login.js"></script>

</html>
