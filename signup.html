<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0ede8;
      padding: 2rem;
      font-family:  sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 20px;
      border: 1px solid #e0ddd8;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 2px;
      color: #1a1a1a;
      margin-bottom: 0.3rem;
    }

    .tagline {
      font-size: 13px;
      color: #888;
      margin-bottom: 2rem;
    }

    .field {
      margin-bottom: 1.2rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 6px;
    }

    #semail, #spassword {
      width: 100%;
      padding: 11px 14px;
      font-size: 14px;
      font-family: Georgia, serif;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      background: #faf9f7;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #semail:focus, #spassword:focus {
      border-color: #1a1a1a;
      background: #fff;
    }

    #semail::placeholder, #spassword::placeholder {
      color: #bbb;
      font-style: italic;
    }

    #semail:focus:invalid, #spassword:focus:invalid {
      border-color: #c0392b;
    }

    #semail:focus:valid, #spassword:focus:valid {
      border-color: #27ae60;
    }

    hr {
      border: none;
      border-top: 1px solid #ece9e4;
      margin: 0.4rem 0 1rem 0;
    }

    #mess {
      display: block;
      font-size: 12px;
      color: #c0392b;
      font-style: italic;
      min-height: 18px;
      margin-bottom: 0.8rem;
    }

    #sbtn {
      width: 100%;
      padding: 12px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-family: sans-serif;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    #sbtn:hover { opacity: 0.85; }
    #sbtn:active { transform: scale(0.99); }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 13px;
      color: #888;
    }

    .footer-link a {
      color: #1a1a1a;
      font-weight: bold;
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="brand">SIGN UP</div>
    <div class="tagline">Create a new account — completely free</div>

    <div class="field">
      <label for="semail">Email Address</label>
      <input type="email" placeholder="Enter Your Email" id="semail">
      <hr>
    </div>

    <div class="field">
      <label for="spassword">Password</label>
      <input type="password" placeholder="Enter Your password" id="spassword">
      <hr>
    </div>

    <span id="mess"></span>

    <button id="sbtn">Create Account</button>

    <div class="footer-link">
      Already have an account? <a href="#">Login here</a>
    </div>
  </div>
</div>

</head>
<body>

     -->
</body>
<script type="module" src="auth.js"></script>
</html>
